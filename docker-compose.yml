version: '3.8'

services:
  # The Frontend React Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: entertainment-service-ui:latest
    container_name: entertainment_frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - database
    networks:
      - entertainment-network

  # The Database Dependency
  database:
    image: postgres:15-alpine
    container_name: entertainment_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: entertainment_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - entertainment-network

networks:
  entertainment-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
