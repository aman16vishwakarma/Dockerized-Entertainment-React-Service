name: CI/CD Docker Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        # These are securely pulled from your GitHub repository settings
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Frontend UI Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./frontend.Dockerfile
        push: true
        # GitHub action will automatically tag it with 'latest'
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/nomad-frontend:latest

    - name: Build and Push API Backend Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./backend.Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/nomad-backend:latest
